

<!doctype html>

<!-- <html xmlns:th="http://www.thymeleaf.org"> -->
<html>
<head>
    <meta charset="UTF-8" />
    <title>Danh sách thế giới</title>
    <style>
        /* =====================================================
WORLD LIST PAGE - DARK FANTASY ADMIN
===================================================== */

        :root {
            --blood-red: #8B0000;
            --crimson: #C41E3A;
            --dark-bg: #080604;
            --dark-card: #1C1410;
            --border-dark: #2E201A;
            --border-mid: #4A3028;
            --cream: #DDD0B8;
            --parchment: #C4A882;
            --light-grey: #C8C1BC;
            --mid-grey: #8F7E76;
            --gold: #C9A44C;
        }

        /* =====================================================
PAGE
===================================================== */

        main {
            padding: 30px;
        }

        h1 {
            color: var(--cream);
            margin-bottom: 25px;

            font-size: 2.2rem;
            font-family: "Cormorant Garamond", serif;

            letter-spacing: .05em;

        }

        /* =====================================================
ALERT
===================================================== */

        p[style*="green"] {
            background: rgba(60, 150, 60, .15);
            color: #8ff19d;
            padding: 12px 16px;
            border-left: 4px solid #4caf50;
            margin-bottom: 15px;
        }

        p[style*="red"] {
            background: rgba(196, 30, 58, .12);
            color: #ff9e9e;
            padding: 12px 16px;
            border-left: 4px solid var(--crimson);
            margin-bottom: 15px;
        }

        /* =====================================================
CREATE BUTTON
===================================================== */

        a[href*="create"] {
            display: inline-block;
            padding: 12px 22px;
            background: var(--blood-red);
            border: 1px solid var(--crimson);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: .3s;
        }

        a[href*="create"]:hover {
            background: var(--crimson);
            transform: translateY(-2px);
        }

        /* =====================================================
TABLE
===================================================== */

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
            background: var(--dark-card);
            border: 1px solid var(--border-dark);
            overflow: hidden;

        }

        thead {
            background:
                linear-gradient(180deg,
                    rgba(139, 0, 0, .25),
                    rgba(139, 0, 0, .08));
        }

        th {
            padding: 15px;
            color: var(--parchment);
            text-transform: uppercase;
            letter-spacing: .08em;
            font-size: .85rem;
            border-bottom: 1px solid var(--border-dark);
        }

        td {
            padding: 15px;
            color: var(--light-grey);
            border-bottom: 1px solid rgba(255, 255, 255, .05);
            vertical-align: middle;

        }

        tbody tr {
            transition: .25s;
        }

        tbody tr:hover {
            background: rgba(139, 0, 0, .08);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        /* =====================================================
IMAGE
===================================================== */

        td img {
            width: 120px;
            height: 70px;

            object-fit: cover;

            border: 1px solid var(--border-mid);

            border-radius: 4px;

        }

        /* =====================================================
STATUS
===================================================== */

        .status-active {
            color: #86f3a2;
            font-weight: 600;
        }

        .status-deleted {
            color: #ff8f8f;
            font-weight: 600;
        }

        /* =====================================================
ACTION BUTTONS
===================================================== */

        td form {
            display: inline-block;

            margin-right: 5px;
            margin-bottom: 5px;

        }

        button {
            cursor: pointer;

            padding: 8px 16px;

            border: none;

            border-radius: 4px;

            transition: .3s;

        }

        /* Edit */

        button[type="submit"] {
            background: #2b211c;
            color: var(--cream);
            border: 1px solid var(--border-mid);
        }

        button[type="submit"]:hover {
            border-color: var(--crimson);
        }

        /* Delete */

        form[action*="delete"] button {
            background: transparent;

            border: 1px solid var(--crimson);

            color: var(--crimson);

        }

        form[action*="delete"] button:hover {
            background: var(--crimson);
            color: white;
        }

        /* Restore */

        form[action*="restore"] button {
            background: var(--gold);

            color: #111;

        }

        form[action*="restore"] button:hover {
            filter: brightness(1.1);
        }

        /* =====================================================
PAGINATION
===================================================== */

        div[th\:if] {
            margin-top: 30px;
        }

        div[th\:if] a,
        div[th\:if] span {
            display: inline-block;

            margin: 0 3px;

        }

        div[th\:if] a {
            padding: 10px 15px;

            background: var(--dark-card);

            border: 1px solid var(--border-mid);

            color: var(--cream);

            text-decoration: none;

            transition: .3s;

        }

        div[th\:if] a:hover {
            border-color: var(--crimson);

            color: var(--crimson);

        }

        div[th\:if] span[style] {
            padding: 10px 15px;

            background: var(--blood-red);

            border: 1px solid var(--crimson);

            color: white;

        }
.bg-image{
    position:fixed;
    inset:0;

    background-image:
        linear-gradient(
            rgba(0,0,0,.65),
            rgba(0,0,0,.85)
        ),
        url('img/back.png');

    background-size:cover;
    background-position:center;

    z-index:-2;
}

.bg-image::after{
    content:"";

    position:absolute;
    inset:0;

    background:
        radial-gradient(
            circle at top,
            rgba(196,30,58,.15),
            transparent 35%
        );

    z-index:-1;
}
        /* =====================================================
RESPONSIVE
===================================================== */

        @media(max-width:992px) {


            table {
                min-width: 900px;
            }

            main {
                overflow-x: auto;
            }


        }

        @media(max-width:768px) {


            h1 {
                font-size: 1.8rem;
            }

            td,
            th {
                padding: 10px;
            }


        }
    </style>
</head>

<body>
    <div class="layout">
        <th:block th:replace="~{cms/fragments/sidebar :: sidebar}"></th:block>

        <div class="content-wrapper">
            <th:block th:replace="~{cms/fragments/header :: header}"></th:block>
            <div class="bg-image"></div>
            <main class="cms-page">

                <div class="cms-header">
                    <h1 class="cms-title">Danh sách thế giới</h1>

                    <a th:href="@{/world/moonblight/create}" class="btn btn-primary">
                        + Tạo thế giới mới
                    </a>
                </div>

                <p class="alert-success" th:if="${successMessage}" th:text="${successMessage}">
                </p>

                <p class="alert-error" th:if="${errorMessage}" th:text="${errorMessage}">
                </p>

                <div class="table-wrapper">

                    <table class="cms-table">

                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Ảnh</th>
                                <th>Ưu tiên</th>
                                <th>Tag</th>
                                <th>Tiêu đề</th>
                                <th>Trạng thái</th>
                                <th>Hành động</th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr th:each="world : ${worlds.content}">

                                <td th:text="${world.id}"></td>

                                <td>
                                    <img th:if="${world.image != null}" th:src="${world.image}" alt="World Image"
                                        class="table-image">
                                </td>

                                <td th:text="${world.priority}"></td>

                                <td th:text="${world.tag}"></td>

                                <td th:text="${world.title}"></td>

                                <td>
                                    <span class="status"
                                        th:classappend="${world.deleted} ? 'status-deleted' : 'status-active'"
                                        th:text="${world.deleted ? 'Đã xóa' : 'Đang hiển thị'}">
                                    </span>
                                </td>

                                <td class="action-group">

                                    <form th:action="@{/world/moonblight/{id}/edit(id=${world.id})}" method="get">
                                        <button type="submit" class="btn btn-secondary">
                                            Sửa
                                        </button>
                                    </form>

                                    <form th:if="${!world.deleted}"
                                        th:action="@{/world/moonblight/{id}/delete(id=${world.id})}" method="post">

                                        <button type="submit" class="btn btn-outline-red">
                                            Xóa
                                        </button>
                                    </form>

                                    <form th:if="${world.deleted}"
                                        th:action="@{/world/moonblight/{id}/restore(id=${world.id})}" method="post">

                                        <button type="submit" class="btn btn-gold">
                                            Khôi phục
                                        </button>
                                    </form>

                                </td>

                            </tr>
                        </tbody>

                    </table>

                </div>

                <div class="pagination" th:if="${worlds.totalPages > 1}">

                    <a class="page-btn" th:if="${!worlds.first}"
                        th:href="@{/world/moonblight/list(page=${worlds.number - 1})}">
                        ← Trước
                    </a>

                    <!-- <span th:each="i : ${#numbers.sequence(0, worlds.totalPages - 1)}"> -->
                    <span >

                        <a class="page-number" th:if="${i != worlds.number}"
                            th:href="@{/world/moonblight/list(page=${i})}" th:text="${i + 1}">
                        </a>

                        <span class="page-number active" th:if="${i == worlds.number}" th:text="${i + 1}">
                        </span>

                    </span>

                    <a class="page-btn" th:if="${!worlds.last}"
                        th:href="@{/world/moonblight/list(page=${worlds.number + 1})}">
                        Sau →
                    </a>

                </div>

            </main>
        </div>
    </div>
</body>

</html>
