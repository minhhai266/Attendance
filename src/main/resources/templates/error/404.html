<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Không tìm thấy trang</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
    .error-container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; text-align: center; padding: 2rem; }
    .error-icon { font-size: 8rem; color: #dc3545; margin-bottom: 1rem; }
    .error-code { font-size: 4rem; font-weight: bold; color: #333; margin-bottom: 1rem; }
    .error-message { font-size: 1.5rem; color: #666; margin-bottom: 2rem; }
    .btn-back { padding: 0.75rem 2rem; background-color: #007bff; color: white; text-decoration: none; border-radius: 0.5rem; font-weight: 500; }
    .btn-back:hover { background-color: #0056b3; color: white; text-decoration: none; }
  </style>
</head>

<body>
  <div class="error-container">
    <i class="bi bi-search error-icon"></i>
    <div class="error-code">404</div>
    <div class="error-message">Không tìm thấy trang</div>
    <a href="/" class="btn-back">
      <i class="bi bi-house-door"></i> Về trang chủ
    </a>
  </div>
</body>

</html>
