<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý điểm danh</title>
    <link rel="stylesheet" href="/css/attendance/attendance.css">


</head>

<body>
    <div class="bg-img"></div>
    <div class="layout">
        <div th:replace="~{cms/sidebar/sidebar-manage :: sidebar}"></div>

        <div id="attendance" class="page">

            <div class="attendance-container">

                <!-- Header -->
                <div class="attendance-header">
                    <h1>Quản lý điểm danh</h1>
                    <p>Theo dõi tình trạng điểm danh sinh viên theo thời gian thực</p>
                </div>
                <div class="attendance-body">
                    <!-- Stats -->
                    <div class="stats-grid">

                        <div class="stats-card present">
                            <span class="stats-value" id="presentCount">0</span>
                            <span class="stats-label">Đã điểm danh</span>
                        </div>

                        <div class="stats-card present">
                            <span class="stats-value" id="presentCount">0</span>
                            <span class="stats-label">Đã check out</span>
                        </div>

                        <div class="stats-card absent">
                            <span class="stats-value" id="absentCount">0</span>
                            <span class="stats-label">Vắng mặt</span>
                        </div>

                        <div class="stats-card pending">
                            <span class="stats-value" id="pendingCount">0</span>
                            <span class="stats-label">Chưa điểm danh</span>
                        </div>

                        <div class="stats-card late">
                            <span class="stats-value" id="lateCount">0</span>
                            <span class="stats-label">Đi muộn</span>
                        </div>

                    </div>

                    <!-- Filter -->
                    <div class="card filter-card">

                        <div class="filter-panel">

                            <input id="attendanceSearch" class="search-input" placeholder="Tìm mã SV hoặc họ tên">

                            <select id="attendanceStatusFilter">
                                <option value="">Tất cả trạng thái</option>
                                <option value="present_on_time">Đúng giờ</option>
                                <option value="late">Đi muộn</option>
                                <option value="early_leave">Về sớm</option>
                                <option value="absent">Vắng mặt</option>
                            </select>

                            <input id="attendanceDateFrom" type="date">
                            <input id="attendanceDateTo" type="date">

                            <button onclick="loadAttendanceRecords()">
                                Lọc
                            </button>

                            <button class="secondary" onclick="resetAttendanceFilters()">
                                Hôm nay
                            </button>

                        </div>

                    </div>

                    <!-- Table -->
                    <div class="card table-card">

                        <div class="table-header">
                            <h3>Danh sách điểm danh</h3>
                            <span id="attendanceCount"></span>
                        </div>

                        <div class="table-scroll">

                            <table class="attendance-table">

                                <thead>
                                    <tr>
                                        <th>Ngày</th>
                                        <th>Sinh viên</th>
                                        <th>Vào</th>
                                        <th>Ra</th>
                                        <th>Trạng thái</th>
                                        <th>Hiện diện</th>
                                        <th>Muộn</th>
                                        <th>Về sớm</th>
                                        <th>Tổng giờ</th>
                                        <th>Ghi chú</th>
                                        <th>Chi tiết</th>
                                    </tr>
                                </thead>

                                <tbody id="attendanceTable"></tbody>

                            </table>

                        </div>
                    </div>

                </div>

            </div>

        </div>
    </div>


</body>

</html>
