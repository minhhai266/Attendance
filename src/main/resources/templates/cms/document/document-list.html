<!doctype html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <title>Danh sách báo cáo</title>
    <link rel="stylesheet" th:href="@{/css/document/document-list.css}">

</head>

<body>
    <div class="bg-image"></div>
    <div class="layout">
        <div th:replace="~{cms/sidebar/sidebar-role :: sidebar}"></div>

        <div class="container-layout">

            <div class="container-header">
                <h1>Danh sách báo cáo</h1>
                <p>Xem các báo cáo ở đây</p>
            </div>

            <main class="main-container">

                <div class="document-card">

                    <div class="document-container">

                        <table class="document-table">
                            <thead>
                                <tr>
                                    <th>Người chia sẻ</th>
                                    <th>Tiêu đề</th>
                                    <th>Ngày nộp</th>
                                    <th>File đính kèm</th>
                                    <th>Link tài liệu</th>
                                    
                                </tr>
                            </thead>

                            <tbody id="reportTableBody">
                                <tr>
                                    <td colspan="5" style="text-align:center">Đang tải...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="pagination">
                        <a class="btn btn-pagination">
                            ← Trước
                        </a>

                        <span>
                            <a></a>
                            <span></span>
                        </span>

                        <a class="btn btn-pagination">
                            Sau →
                        </a>
                    </div>
                </div>

            </main>
            <div th:replace="~{cms/layout/footer :: footer}"></div>

        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const tableBody = document.getElementById('reportTableBody');

            Promise.all([
                fetch('/api/report/my-reports').then(res => res.json()),
                fetch('/api/report/shared-with-me').then(res => res.json())
            ])
            .then(([myReports, sharedReports]) => {
                tableBody.innerHTML = '';

                const allReports = [];

                if (myReports.content && myReports.content.length > 0) {
                    allReports.push(...myReports.content);
                }

                if (sharedReports.content && sharedReports.content.length > 0) {
                    // Add reports shared with me that are not already in my reports
                    sharedReports.content.forEach(shared => {
                        if (!allReports.some(r => r.id === shared.id)) {
                            allReports.push(shared);
                        }
                    });
                }

                // Sort by createdAt descending
                allReports.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

                if (allReports.length > 0) {
                    allReports.forEach(report => {
                        const row = document.createElement('tr');

                        const date = new Date(report.createdAt);
                        const formattedDate = date.toLocaleDateString('vi-VN');

                        const employeeName = report.employeeName || 'N/A';
                        const attachmentUrl = report.attachmentUrl || '';
                        const attachmentFiles = report.attachmentFiles || '';

                        // Hiển thị files đính kèm
                        let filesHtml = '<span>Không có</span>';
                        if (attachmentFiles) {
                            const filePaths = attachmentFiles.split(',');
                            filesHtml = filePaths.map(path => {
                                const filename = path.split('/').pop();
                                return '<a href="' + path + '" class="file-link" download>📎 ' + filename + '</a>';
                            }).join('<br>');
                        }

                        // Hiển thị link
                        const linkHtml = attachmentUrl ? 
                            '<a href="' + attachmentUrl + '" target="_blank" class="file-link">🔗 Mở link</a>' : 
                            '<span>Không có</span>';

                        row.innerHTML = 
                            '<td>' + employeeName + '</td>' +
                            '<td>' + report.title + '</td>' +
                            '<td>' + formattedDate + '</td>' +
                            '<td>' + filesHtml + '</td>' +
                            '<td>' + linkHtml + '</td>';

                        tableBody.appendChild(row);
                    });
                } else {
                    tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center">Không có báo cáo nào</td></tr>';
                }
            })
            .catch(error => {
                console.error('Error loading reports:', error);
                tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center">Lỗi khi tải danh sách báo cáo</td></tr>';
            });
        });
    </script>
</body>
</html>
