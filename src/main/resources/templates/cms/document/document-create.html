<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nộp báo cáo công việc</title>

    <link rel="stylesheet" th:href="@{/css/document/document-create.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div class="bg-image"></div>

    <div class="layout">

        <!-- SIDEBAR -->
        <div th:replace="~{cms/sidebar/sidebar-employee :: sidebar}"></div>

        <!-- CONTENT -->
        <div class="container-layout">

            <!-- HEADER -->
            <div class="container-header">
                <h1>Nộp báo cáo công việc</h1>
                <p>Gửi báo cáo và chia sẻ cho phòng ban</p>
            </div>

            <main class="main-container">

                <!-- FORM CARD -->
                <section class="dashboard-card">

                    <div class="card-header">
                        <h2>Gửi báo cáo</h2>
                    </div>

                    <div class="card-body">

                        <form method="post" th:action="@{/report/create}" enctype="multipart/form-data">

                            <!-- Nội dung -->
                            <div class="form-group">
                                <label>Nội dung báo cáo</label>
                                <textarea name="content" rows="5" placeholder="Nhập nội dung báo cáo..."
                                    required></textarea>
                            </div>

                            <!-- Phòng ban -->
                            <div class="form-group">
                                <label>Phòng ban</label>

                                <select name="departmentId" id="departmentSelect" required>
                                    <option value="" disabled selected>Chọn phòng ban</option>

                                    <option th:each="d : ${departments}" th:value="${d.id}" th:text="${d.name}">
                                    </option>
                                </select>
                            </div>

                            <!-- Người được xem -->
                            <div class="form-group">
                                <label>Người được chia sẻ</label>

                                <select name="sharedUserIds" id="userSelect" multiple class="multi-select">
                                    <option value="">Chọn phòng ban trước</option>
                                </select>
                            </div>

                            <!-- Upload file -->
                            <div class="form-group">
                                <label>Tệp đính kèm</label>

                                <input type="file" name="files" multiple>
                            </div>

                            <!-- Link -->
                            <div class="form-group">
                                <label>Hoặc liên kết</label>

                                <input type="url" name="link" placeholder="https://drive.google.com/...">
                            </div>

                            <!-- BUTTON -->
                            <div class="form-actions">

                                <button type="submit" class="btn-primary">
                                    <i class="fa-regular fa-paper-plane"></i>
                                    Gửi báo cáo
                                </button>

                                <button type="reset" class="btn-secondary">
                                    Reset
                                </button>

                            </div>

                        </form>

                    </div>

                </section>

            </main>
            <div th:replace="~{cms/layout/footer :: footer}"></div>

        </div>
    </div>

    <!-- FOOTER -->

    <!-- JS load user theo phòng -->
    <script>
        document.getElementById("departmentSelect").addEventListener("change", function () {

            const departmentId = this.value;

            fetch(`/api/users/by-department/${departmentId}`)
                .then(res => res.json())
                .then(data => {

                    const userSelect = document.getElementById("userSelect");
                    userSelect.innerHTML = "";

                    data.forEach(user => {
                        const option = document.createElement("option");
                        option.value = user.id;
                        option.text = user.fullName;
                        userSelect.appendChild(option);
                    });

                });

        });
    </script>

</body>

</html>
