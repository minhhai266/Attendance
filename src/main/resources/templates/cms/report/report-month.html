```html
<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo cáo tháng</title>
    <link rel="stylesheet" href="/css/report/report-month.css">
</head>

<body>

    <div class="bg-image"></div>

    <div class="layout">

        <div th:replace="~{cms/sidebar/sidebar-manager :: sidebar}"></div>

        <div class="container-layout">

            <div class="container-header">
                <h1>Báo cáo hằng tháng</h1>
                <p>Thống kê chuyên cần hằng tháng </p>
            </div>

            <main class="main-container">

                <!-- Filter -->
                <div class="filter-bar">

                    <div class="filter-group">
                        <label>Phòng ban</label>
                        <select>
                            <option>IT</option>
                            <option>Marketing</option>
                            <option>Nhân sự</option>
                            <option>Kế toán</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label>Tháng</label>
                        <input type="month">
                    </div>

                    <button class="export-btn">
                        Xuất Excel
                    </button>

                </div>

                <!-- Overview -->
                <div class="overview-grid">

                    <div class="stat-card">
                        <h3>Đi muộn</h3>
                        <span>23</span>
                    </div>

                    <div class="stat-card">
                        <h3>Đúng giờ</h3>
                        <span>154</span>
                    </div>

                    <div class="stat-card">
                        <h3>Về sớm</h3>
                        <span>12</span>
                    </div>

                    <div class="stat-card">
                        <h3>Nghỉ phép</h3>
                        <span>8</span>
                    </div>

                    <div class="stat-card">
                        <h3>Báo cáo đã nộp</h3>
                        <span>46</span>
                    </div>

                </div>

                <!-- Chart -->
                <div class="chart-card">

                    <h2>Thống kê phòng ban</h2>

                    <div id="monthlyChart"></div>

                </div>

                <!-- Table -->
                <div class="table-card">

                    <h2>Chi tiết thành viên</h2>

                    <table class="report-table">

                        <thead>
                            <tr>
                                <th>Tên</th>
                                <th>Phòng</th>
                                <th>Đi muộn</th>
                                <th>Đúng giờ</th>
                                <th>Về sớm</th>
                                <th>Nghỉ phép</th>
                                <th>Báo cáo nộp</th>
                            </tr>
                        </thead>

                        <tbody>

                            <tr>
                                <td>Nguyễn Văn A</td>
                                <td>IT</td>
                                <td>3</td>
                                <td>22</td>
                                <td>1</td>
                                <td>0</td>
                                <td>5</td>
                            </tr>

                            <tr>
                                <td>Trần Thị B</td>
                                <td>IT</td>
                                <td>1</td>
                                <td>24</td>
                                <td>0</td>
                                <td>1</td>
                                <td>4</td>
                            </tr>

                        </tbody>

                    </table>

                </div>

            </main>
            <div th:replace="~{cms/layout/footer :: footer}"></div>

        </div>

    </div>


    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

    <script>

        var options = {
            chart: {
                type: 'bar',
                height: 350
            },

            series: [{
                name: 'Số lần',
                data: [23, 154, 12, 8, 46]
            }],

            xaxis: {
                categories: [
                    'Đi muộn',
                    'Đúng giờ',
                    'Về sớm',
                    'Nghỉ phép',
                    'Báo cáo'
                ]
            }
        };

        var chart = new ApexCharts(
            document.querySelector("#monthlyChart"),
            options
        );

        chart.render();

    </script>

</body>

</html>
