<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đổi mật khẩu</title>

    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>

<body>

    <div class="bg-image"></div>

    <div class="layout">

        <!-- SIDEBAR -->
        <div th:replace="~{cms/sidebar/sidebar-manage :: sidebar}"></div>

        <!-- MAIN CONTENT -->
        <div class="container-layout">

            <div class="attendance-header">
                <h1>Đổi mật khẩu</h1>
                <p>Cập nhật mật khẩu để bảo mật tài khoản của bạn</p>
            </div>

            <main class="dashboard-manager">

                <div class="dashboard-card" style="max-width: 500px; margin: auto;">

                    <div class="card-header">
                        <h2>Thay đổi mật khẩu</h2>
                    </div>

                    <div class="card-body">

                        <!-- SUCCESS / ERROR -->
                        <div th:if="${successMessage}" class="success-message" th:text="${successMessage}">
                        </div>

                        <div th:if="${errorMessage}" class="error-message" th:text="${errorMessage}">
                        </div>

                        <!-- FORM -->
                        <form th:action="@{/auth/change-password}" method="post">

                            <!-- Mật khẩu cũ -->
                            <div class="auth-group">
                                <label for="oldPassword">Mật khẩu hiện tại</label>
                                <input id="oldPassword" name="oldPassword" type="password"
                                    placeholder="Nhập mật khẩu hiện tại" />
                            </div>

                            <!-- Mật khẩu mới -->
                            <div class="auth-group">
                                <label for="newPassword">Mật khẩu mới</label>
                                <input id="newPassword" name="newPassword" type="password"
                                    placeholder="Nhập mật khẩu mới" />
                            </div>

                            <!-- Xác nhận -->
                            <div class="auth-group">
                                <label for="confirmPassword">Xác nhận mật khẩu</label>
                                <input id="confirmPassword" name="confirmPassword" type="password"
                                    placeholder="Nhập lại mật khẩu mới" />
                            </div>

                            <button class="auth-btn" type="submit">
                                Cập nhật mật khẩu
                            </button>

                        </form>

                        <hr style="margin: 1rem 0; opacity: 0.2" />

                        <div class="other-option">
                            <a th:href="@{/dashboard}" class="register-link">
                                ← Quay lại dashboard
                            </a>
                        </div>

                    </div>

                </div>

            </main>

        </div>
    </div>

    <div th:replace="~{cms/layout/footer :: footer}"></div>

</body>

</html>
