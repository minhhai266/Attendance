<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đổi mật khẩu</title>

    <link rel="stylesheet" th:href="@{/css/password/change-password.css}">
</head>

<body>

    <div class="bg-image"></div>

    <div class="layout">

        <!-- SIDEBAR -->
        <div th:replace="~{cms/sidebar/sidebar-role :: sidebar}"></div>

        <!-- MAIN CONTENT -->
        <div class="container-layout">

            <div class="container-header">
                <h1>Đổi mật khẩu</h1>
                <p>Cập nhật mật khẩu để bảo mật tài khoản của bạn</p>
            </div>

            <main class="main-container">

                <div class="dashboard-card" style="max-width: 500px; margin: auto;">

                    <div class="card-header">
                        <h2>Đặt lại mật khẩu</h2>
                    </div>

                    <div class="card-body">

                        <!-- SUCCESS / ERROR -->
                        <div th:if="${successMessage}" class="success-message" th:text="${successMessage}">
                        </div>

                        <div th:if="${errorMessage}" class="error-message" th:text="${errorMessage}">
                        </div>

                        <!-- FORM cho forgot password flow -->
                        <form th:action="@{/user/update-password}" method="post" th:if="${otpVerified}">

                            <!-- hidden email -->
                            <input type="hidden" name="destination" th:value="${email}" />

                            <!-- Mật khẩu mới -->
                            <div class="auth-group">
                                <label for="password">Mật khẩu mới</label>
                                <input id="password" name="password" type="password"
                                    placeholder="Nhập mật khẩu mới" required />
                            </div>

                            <!-- Xác nhận -->
                            <div class="auth-group">
                                <label for="confirmPassword">Xác nhận mật khẩu</label>
                                <input id="confirmPassword" name="confirmPassword" type="password"
                                    placeholder="Nhập lại mật khẩu mới" required />
                            </div>

                            <button class="auth-btn" type="submit">
                                Cập nhật mật khẩu
                            </button>

                        </form>

                        <!-- Thông báo nếu chưa verify OTP -->
                        <div th:if="${!otpVerified}">
                            <div class="alert alert-warning">
                                Vui lòng xác minh OTP trước khi đổi mật khẩu.
                            </div>
                            <a th:href="@{/auth/verify-otp}" class="auth-btn" style="display: inline-block; text-decoration: none; text-align: center;">
                                Xác minh OTP
                            </a>
                        </div>

                        <hr style="margin: 1rem 0; opacity: 0.2" />

                        <div class="other-option">
                            <a th:href="@{/auth/login}" class="register-link">
                                ← Quay lại đăng nhập
                            </a>
                        </div>

                    </div>

                </div>

            </main>

        </div>
    </div>

    <div th:replace="~{cms/layout/footer :: footer}"></div>

</body>

</html>
