<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quên mật khẩu - Face ID Attendance</title>

    <link rel="stylesheet" th:href="@{/css/auth.css}" />
</head>

<body>

    <div class="bg-img"></div>

    <div th:replace="~{cms/layout/header :: header}"></div>

    <div class="layout">
        <div class="card">

            <div class="card-header">
                <h1 class="card-title">Quên mật khẩu</h1>
                <p class="card-description">
                    Nhập email hoặc username để khôi phục mật khẩu
                </p>
            </div>

            <div class="divider"></div>

            <div class="card-body">

                <!-- Thông báo -->
                <div th:if="${successMessage}" class="success-message" th:text="${successMessage}">
                </div>

                <div th:if="${errorMessage}" class="error-message" th:text="${errorMessage}">
                </div>

                <!-- Form -->
                <form th:action="@{/auth/forgot-password}" method="post">

                    <div class="auth-group">
                        <label for="email">Email hoặc Username</label>
                        <input id="email" name="email" type="text" placeholder="Nhập email hoặc username..." />
                    </div>

                    <button class="auth-btn" type="submit">
                        Gửi yêu cầu khôi phục
                    </button>

                </form>

                <hr style="margin: 1rem 0; opacity: 0.2" />

                <div class="other-option">
                    <a th:href="@{/auth/login}" class="register-link">
                        Quay lại đăng nhập
                    </a>
                </div>

            </div>
        </div>
    </div>

    <div th:replace="~{cms/layout/footer :: footer}"></div>

</body>

</html>
