```html
<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Recognition Dashboard</title>

    <link rel="stylesheet" href="../style.css">

</head>

<body>
    <div class="bg-image"></div>
    <div th:replace="~{cms/fragments/sidebar-employee :: sidebar}"></div>

    <div class="container-layout">
        <header class="page-header">
            <h1>Nộp báo cáo công việc</h1>

            <div class="notification">
                <i class="fa-regular fa-bell"></i>
                <span class="dot"></span>
            </div>
        </header>
        <!-- FACE REGISTER -->
        <section class="card">

            <div class="section-header">
                <h2>Đăng ký khuôn mặt</h2>
            </div>

            <div class="student-select">

                <label>Sinh viên</label>

                <select id="faceStudentSelect">
                    <option>Chọn sinh viên</option>
                </select>

                <button id="faceSampleCount" class="sample-btn">
                    0 / 10 mẫu
                </button>

            </div>

            <div class="face-register-grid">

                <!-- CAMERA -->
                <div class="panel">

                    <div class="panel-header">
                        <h3>Camera đăng ký</h3>

                        <button id="faceRegisterToggleBtn">
                            Bật camera
                        </button>
                    </div>

                    <div class="mode-tabs">

                        <button class="active">
                            Thêm mẫu
                        </button>

                        <button>
                            Quét lại
                        </button>

                    </div>

                    <div class="guide-box">

                        <div id="scanGuideCurrent">
                            Nhìn thẳng vào camera
                        </div>

                        <div id="scanGuideSteps">
                            Bước 1 / 5
                        </div>

                    </div>

                    <div class="video-wrap">
                        <video autoplay muted></video>
                        <canvas></canvas>
                    </div>

                    <div class="action-row">

                        <button>
                            📷 Chụp mẫu
                        </button>

                        <button class="secondary">
                            Làm lại
                        </button>

                    </div>

                </div>

                <!-- UPLOAD -->
                <div class="panel">

                    <div class="panel-header">
                        <h3>Thêm ảnh từ máy</h3>
                    </div>

                    <input type="file" multiple accept="image/*">

                    <button class="upload-btn">
                        Upload ảnh
                    </button>

                    <div class="info-box">
                        Ảnh cần chứa đúng 1 khuôn mặt, rõ nét và đủ sáng.
                    </div>

                </div>

            </div>

        </section>

        <!-- REALTIME CAMERA -->

        <section class="card">

            <div class="section-header">
                <h2>Điểm danh Realtime</h2>
            </div>

            <div class="camera-actions">

                <button>
                    Check In ON
                </button>

                <button>
                    Check Out ON
                </button>

                <button class="secondary">
                    Tắt tất cả
                </button>

            </div>

            <div class="dual-camera-grid">

                <div class="camera-panel">

                    <div class="camera-panel-header">
                        <h3>Check In</h3>
                        <span>Đang tắt</span>
                    </div>

                    <div class="video-wrap">
                        <video autoplay muted></video>
                        <canvas></canvas>
                    </div>

                    <div class="camera-result">
                        Chưa bật camera
                    </div>

                </div>

                <div class="camera-panel">

                    <div class="camera-panel-header">
                        <h3>Check Out</h3>
                        <span>Đang tắt</span>
                    </div>

                    <div class="video-wrap">
                        <video autoplay muted></video>
                        <canvas></canvas>
                    </div>

                    <div class="camera-result">
                        Chưa bật camera
                    </div>

                </div>

            </div>

        </section>

    </div>

</body>

</html>
