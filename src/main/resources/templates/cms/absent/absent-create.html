<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <title>Xin nghỉ phép</title>

    <link rel="stylesheet" th:href="@{/css/world/world.css}">
    <link rel="stylesheet" th:href="@{/css/absent/absent-create.css}">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div class="bg-image"></div>

    <div class="layout">

        <!-- SIDEBAR -->
        <div th:replace="~{cms/sidebar/sidebar-manage :: sidebar}"></div>

        <!-- CONTENT -->
        <div class="container-layout">

            <!-- HEADER -->
            <div class="attendance-header">
                <h1>Xin nghỉ phép</h1>
                <p>Tạo đơn xin nghỉ phép mới</p>
            </div>

            <main class="dashboard-manager">

                <!-- FORM CARD -->
                <section class="dashboard-card">

                    <div class="card-header">
                        <h2>Đơn xin nghỉ phép</h2>
                    </div>

                    <div class="card-body">

                        <form class="absent-form" method="post" th:action="@{/absent/create}">
                            <!-- Phòng ban -->
                            <div class="form-group">
                                <label>Phòng ban</label>

                                <select name="departmentId" required>
                                    <option value="" disabled selected>Chọn phòng ban</option>

                                    <option th:each="d : ${departments}" th:value="${d.id}" th:text="${d.name}">
                                    </option>

                                </select>
                            </div>
                            <!-- Loại nghỉ -->
                            <div class="form-group">
                                <label>Loại nghỉ phép</label>

                                <select name="type" required>
                                    <option value="" disabled selected>Chọn loại nghỉ phép</option>
                                    <option value="PAID">Nghỉ có lương</option>
                                    <option value="UNPAID">Nghỉ không lương</option>
                                    <option value="SICK">Nghỉ bệnh</option>
                                    <option value="ANNUAL">Nghỉ phép năm</option>
                                </select>
                            </div>

                            <!-- Date -->
                            <div class="form-grid">

                                <div class="form-group">
                                    <label>Từ ngày</label>
                                    <input type="date" name="startDate" required>
                                </div>

                                <div class="form-group">
                                    <label>Đến ngày</label>
                                    <input type="date" name="endDate" required>
                                </div>

                            </div>

                            <!-- Lý do -->
                            <div class="form-group">
                                <label>Lý do</label>
                                <textarea name="reason" rows="5" placeholder="Nhập lý do xin nghỉ..."
                                    required></textarea>
                            </div>

                            <!-- BUTTON -->
                            <div class="form-actions">
                                <button type="submit" class="btn-primary">
                                    <i class="fa-regular fa-paper-plane"></i>
                                    Gửi đơn
                                </button>

                                <button type="reset" class="btn-secondary">
                                    Reset
                                </button>
                            </div>

                        </form>

                    </div>

                </section>

            </main>

        </div>
    </div>

    <!-- FOOTER -->
    <div th:replace="~{cms/layout/footer :: footer}"></div>

</body>

</html>
